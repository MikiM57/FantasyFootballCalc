services:
  - type: web
    name: fantasyfootballcalc
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e ".[api]"
    startCommand: uvicorn fantasy_value.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STATS_PROVIDER
        value: "online"
      - key: ENABLE_ONLINE_STATS
        value: "true"
      - key: ONLINE_PLAYER_LIMIT
        value: "250"
      - key: NFLVERSE_FALLBACK_SEASONS
        value: "2"
      - key: ENABLE_SCHEDULE_STRENGTH
        value: "true"
      - key: RUNTIME_PLAYERS_FILE
        value: data/runtime/latest_players.json
      - key: RUNTIME_MENTIONS_FILE
        value: data/runtime/latest_mentions.json
      - key: ENABLE_DAILY_AGENTS
        value: "true"
      - key: RUN_AGENTS_ON_START
        value: "true"
      - key: ALLOW_AGENT_MANUAL_RUN
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
