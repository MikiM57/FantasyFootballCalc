name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  run-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev,api]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: CLI ranking smoke test
        run: python -m fantasy_value.cli rank --players data/sample_players.json --mentions data/sample_mentions.json
      - name: CLI trade smoke test
        run: python -m fantasy_value.cli trade --players data/sample_players.json --mentions data/sample_mentions.json --give derrick-henry --get drake-london
      - name: Start API and run web smoke test
        run: |
          uvicorn fantasy_value.api:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid
          python scripts/smoke_test.py --base-url http://127.0.0.1:8000
      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: uvicorn.log
